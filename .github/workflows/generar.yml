name: Generar episodios

on:
  schedule:
    - cron: '0 12 * * *'   # todos los dias a las 12:00 UTC (~06:00 en Puebla)
  workflow_dispatch:        # permite ejecutarlo manualmente desde la pestana Actions

permissions:
  contents: write

jobs:
  generar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Generar audios y feed
        run: python generar.py

      - name: Publicar cambios
        run: |
          git config user.name "bot-podcast"
          git config user.email "bot@users.noreply.github.com"
          git add docs estado
          git diff --cached --quiet || git commit -m "Nuevos episodios $(date -u +%F)"
          git push
